<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>UnitFlow AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f2; }
    #root { min-height: 100vh; }
    #loading {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #f7f5f2;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    #loading-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #e07d2a, #c45e0a);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(224,125,42,0.4);
    }
    #loading p { font-size: 13px; color: #a09890; }
  </style>
</head>
<body>

  <!-- Loading screen shown until React mounts -->
  <div id="loading">
    <div id="loading-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <p>Loading UnitFlow AI...</p>
  </div>

  <div id="root" style="display:none"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js" crossorigin></script>

  <!-- Babel to transform JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>

  <!-- Storage polyfill for window.storage fallback -->
  <script>
    // Simple window.storage shim using localStorage as fallback
    window.storage = {
      _data: {},
      async get(key, shared) {
        const k = (shared ? 'shared_' : '') + key;
        try {
          const val = localStorage.getItem(k);
          return val ? { key, value: val, shared: !!shared } : null;
        } catch { return null; }
      },
      async set(key, value, shared) {
        const k = (shared ? 'shared_' : '') + key;
        try {
          localStorage.setItem(k, value);
          return { key, value, shared: !!shared };
        } catch { return null; }
      },
      async delete(key, shared) {
        const k = (shared ? 'shared_' : '') + key;
        try {
          localStorage.removeItem(k);
          return { key, deleted: true, shared: !!shared };
        } catch { return null; }
      },
      async list(prefix, shared) {
        const p = (shared ? 'shared_' : '') + (prefix || '');
        try {
          const keys = Object.keys(localStorage).filter(k => k.startsWith(p));
          return { keys, prefix, shared: !!shared };
        } catch { return { keys: [] }; }
      }
    };
  </script>

  <!-- Load and transform the app -->
  <script>
    // Fetch the JSX file, transform it with Babel, then execute it
    fetch('./UnitFlowPro.jsx')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load UnitFlowPro.jsx: ' + r.status);
        return r.text();
      })
      .then(code => {
        // Transform JSX to JS using Babel standalone
        const transformed = Babel.transform(code, {
          presets: ['react'],
          plugins: [],
        }).code;

        // Execute the transformed code
        const script = document.createElement('script');
        script.textContent = transformed;
        document.head.appendChild(script);

        // Mount the React app
        const rootEl = document.getElementById('root');
        const loadingEl = document.getElementById('loading');

        rootEl.style.display = 'block';
        loadingEl.style.display = 'none';

        const root = ReactDOM.createRoot(rootEl);
        root.render(React.createElement(App));
      })
      .catch(err => {
        document.getElementById('loading').innerHTML = `
          <div style="text-align:center;padding:40px;font-family:'Plus Jakarta Sans',sans-serif">
            <div style="font-size:32px;margin-bottom:16px">!</div>
            <p style="font-size:16px;font-weight:700;color:#1a1614;margin-bottom:8px">Something went wrong</p>
            <p style="font-size:13px;color:#6b6560;margin-bottom:16px">${err.message}</p>
            <p style="font-size:12px;color:#a09890">Make sure UnitFlowPro.jsx is in the same folder as index.html</p>
          </div>
        `;
        console.error(err);
      });
  </script>

</body>
</html>
